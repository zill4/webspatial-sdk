<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebSpatial Child Surface</title>
    <script>
      window.__WebSpatialChildReady = false;
      window.addEventListener('DOMContentLoaded', () => {
        window.__WebSpatialChildReady = true;
        document.documentElement.dataset.webspatialChildReady = 'true';
        document.body.dataset.webspatialChildReady = 'true';
      });
    </script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
    </style>
  </head>
  <body></body>
</html>
